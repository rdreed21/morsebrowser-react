<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>LICW Morse Practice Page</title>
    <script>
      (function () {
        var match = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
        if (match && (decodeURIComponent(match[1]) === 'true' || decodeURIComponent(match[1]) === '1')) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

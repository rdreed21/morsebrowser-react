name: Deploy web (Cloudflare Pages + RSS Worker)

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        env:
          # The wordfiles plugin defaults to a sibling repo that isn't present
          # in CI; point it at the copy committed under apps/mobile/assets.
          WORDFILES_DIR: ${{ github.workspace }}/apps/mobile/assets/wordfiles
          # Bakes the deployed RSS CORS proxy URL into the SPA. Set this secret
          # to the Worker URL (with a trailing slash) after its first deploy.
          VITE_RSS_PROXY: ${{ secrets.RSS_PROXY_URL }}
        run: npm run build

      - name: Deploy RSS proxy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/rss-proxy

      # `wrangler pages deploy` prompts to create the project if it's missing,
      # which hangs in CI. Create it up front; the `|| true` makes the step a
      # no-op once the project already exists.
      - name: Ensure Pages project exists
        run: npx wrangler@3 pages project create morsebrowser --production-branch=master || true

      - name: Deploy Pages site
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=morsebrowser --branch=master
